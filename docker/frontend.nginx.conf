# nms10 frontend nginx config — runs inside the nms10-frontend container.
#
# - Serves the Vite-built static files at /
# - Falls back to /index.html for client-side routes (React Router)
# - Proxies /api/* and /media/* to the nms10-backend container on the
#   shared docker network. Same-origin to the browser, so no CORS.

server {
    listen 80;
    server_name _;

    # SPA assets and routing
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed JS/CSS/etc that Vite emits — they're versioned
    # by content, never reused.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html — it's the entry point and ships fresh on every
    # deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API requests → backend container
    location /api/ {
        proxy_pass http://nms10-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Submissions can take a moment if backend is doing OG fetch
        proxy_read_timeout 30s;
        # Don't buffer admin uploads
        proxy_request_buffering off;
        client_max_body_size 12m;   # base hero/gallery uploads
    }

    # Uploaded base media (hero + gallery) — backend serves them at /media/
    location /media/ {
        proxy_pass http://nms10-backend:8000;
        proxy_set_header Host $host;
        # Cacheable; admin doesn't change images often
        expires 1d;
        add_header Cache-Control "public";
    }

    # Scraped social-post media (Bluesky thumbnails etc.)
    location /media-social/ {
        proxy_pass http://nms10-backend:8000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback — anything else hits index.html so React Router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }
}
